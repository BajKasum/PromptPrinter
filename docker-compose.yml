# Production stack — `docker compose up -d`
#
# Liest alle Env-Vars (Build + Runtime) aus `.env`.
# - Build-Args werden via ${VAR}-Interpolation aus `.env` gezogen (Compose-Default)
# - Runtime-Vars im Container kommen aus dem gleichen `.env` via env_file
# Ein einziges File, ein einziger Befehl: `docker compose up -d`

services:
  web:
    image: promptprinter:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Build-time (inlined into the client bundle).
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3001}
    container_name: promptprinter
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3001}:3000"
    env_file:
      - .env
    healthcheck:
      # No external curl in alpine — use node's http to ping the root.
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://127.0.0.1:3000/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
