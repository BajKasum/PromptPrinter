name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref so pushes don't pile up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck · Lint · Test · Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          # Public placeholder values. The Supabase clients read these lazily at
          # runtime (every data page is force-dynamic, so nothing is prerendered
          # against them) — these just keep `next build` from tripping on missing
          # env on a clean runner. They are NOT secrets.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
